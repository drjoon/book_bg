name: Deploy Lambda

on:
  push:
    branches: [main]
    paths:
      - "lambda/book-debeach/**"
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to 4 regions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Build deployment package
        working-directory: lambda/book-debeach
        run: npm run build

      - name: Deploy to all regions in parallel
        working-directory: lambda/book-debeach
        run: |
          REGIONS=("ap-northeast-2" "ap-northeast-1" "ap-southeast-1" "ap-south-1")
          LABELS=("서울" "도쿄" "싱가포르" "뭄바이")
          pids=()
          for i in "${!REGIONS[@]}"; do
            REGION="${REGIONS[$i]}"
            LABEL="${LABELS[$i]}"
            (
              ARN=$(aws lambda update-function-code \
                --function-name book-debeach \
                --zip-file fileb://deployment_package.zip \
                --region "$REGION" \
                --query 'FunctionArn' \
                --output text)
              echo "✅ [$LABEL] $ARN"
            ) &
            pids+=($!)
          done
          failed=0
          for pid in "${pids[@]}"; do
            wait "$pid" || failed=$((failed + 1))
          done
          if [ "$failed" -gt 0 ]; then
            echo "❌ $failed region(s) failed"
            exit 1
          fi
          echo "🎉 Deployed to all ${#REGIONS[@]} regions"
